<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>360 Panorama</title>
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
<link href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css" rel="stylesheet">
<style>
body { margin: 0; }
#panorama { width: 100vw; height: 100vh; }

/* Optional: make fallback image visible immediately */
#panorama::before {
    content: "";
    background: url('https://WideEye360.github.io/panorama-site/sadasssd_lower.jpg') center/cover no-repeat;
    position: absolute;
    width: 100%;
    height: 100%;
    z-index: 0;
}
</style>
</head>
<body>

<div id="panorama"></div>

<script>
pannellum.viewer('panorama', {
    "type": "equirectangular",
    "panorama": "https://WideEye360.github.io/panorama-site/sadasssd.jpg",
    "fallbackPath": "https://WideEye360.github.io/panorama-site/sadasssd_lower.jpg",
    "autoLoad": true,
    "showControls": true,
    "showFullscreenCtrl": true,
    "showZoomCtrl": true,
    "disableKeyboardCtrl": false,
    "compass": false,
    "orientationOnByDefault": false,
    "loadingTxt": "",       // <-- Remove loading text
    "showLoader": false     // <-- Disable loader overlay completely
});
</script>

</body>
</html>
